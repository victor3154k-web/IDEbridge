name: Build Tauri v2 Android APK
on: 
  workflow_dispatch:
  push:
    branches: [ "main", "master" ] # Dispara a build automaticamente quando der push

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Código-Fonte
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Configurar Android SDK
        uses: android-actions/setup-android@v3

      - name: Configurar Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: 'aarch64-linux-android, armv7-linux-androideabi'

      - name: Instalar Dependências do Frontend
        run: npm install

      - name: Instalar Tauri CLI via Cargo
        run: cargo install tauri-cli --version "^2.0.0"

      - name: Inicializar Configurações do Android (Modo CI)
        run: cargo tauri android init --ci

      - name: Injetar Permissões de Armazenamento no Manifesto do Android
        run: |
          MANIFEST_PATH=$(find src-tauri -name AndroidManifest.xml)
          if [ -n "$MANIFEST_PATH" ]; then
            echo "Manifesto encontrado em: $MANIFEST_PATH"
            sed -i '/<\/manifest>/i \    <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE"/>\n    <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE"/>' "$MANIFEST_PATH"
          else
            echo "Aviso: AndroidManifest.xml nao encontrado para injetar permissoes."
          fi

      - name: Compilar APK (Modo Debug)
        run: cargo tauri android build --debug

      - name: Enviar APK Gerado como Artefato
        uses: actions/upload-artifact@v4
        with:
          name: bridge-v2-android-apk
          path: "**/build/outputs/apk/**/*.apk"
